<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>علمینو</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #0ea5e9);
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      filter: blur(18px);
      animation: floatGlow 5s ease-in-out infinite;
    }

    .bg-glow.one {
      top: 8%;
      right: 10%;
    }

    .bg-glow.two {
      bottom: 10%;
      left: 8%;
      animation-delay: 1.5s;
    }

    .splash-box {
      width: min(90vw, 380px);
      padding: 36px 24px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      animation: boxEnter 1s ease forwards;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .logo-square {
      width: 116px;
      height: 116px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #ffffff, #dbeafe);
      color: #0f172a;
      font-size: 58px;
      font-weight: bold;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.25);
      animation: logoDrop 1.2s ease forwards;
    }

    .brand-title {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.5px;
      animation: fadeUp 1.4s ease forwards;
    }

    .brand-subtitle {
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 14px;
      line-height: 1.8;
      animation: fadeUp 1.6s ease forwards;
    }

    .loader {
      width: 100%;
      height: 8px;
      margin-top: 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, #22d3ee, #ffffff, #38bdf8);
      animation: loadingBar 2.6s linear forwards;
    }

    .hint {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
    }

    @keyframes logoDrop {
      0% {
        opacity: 0;
        transform: translateY(-70px) scale(0.7) rotate(-8deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
      }
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(22px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes boxEnter {
      0% {
        opacity: 0;
        transform: scale(0.92);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes loadingBar {
      0% {
        width: 0;
      }
      100% {
        width: 100%;
      }
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-18px);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="splash-box">
    <div class="logo-wrap">
      <div class="logo-square">ع</div>
      <h1 class="brand-title">علمینو</h1>
      <p class="brand-subtitle">مسابقه اطلاعات عمومی با امتیازدهی واقعی، رقابت 3 نفره و تعیین برنده بر اساس عملکرد</p>
    </div>

    <div class="loader">
      <span></span>
    </div>

    <div class="hint">در حال ورود به سامانه...</div>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "/landing";
    }, 2800);
  </script>
</body>
</html>
