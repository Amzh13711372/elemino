{% extends "base.html" %}
{% block title %}ورود ادمین{% endblock %}
{% block content %}
<section class="card form-card">
  <h2>ورود ادمین</h2>

  {% if request.query_params.get('error') %}
    <p class="msg error">اطلاعات ادمین اشتباه است.</p>
  {% endif %}

  <form method="post" action="/admin-login">
    <label>نام کاربری</label>
    <input type="text" name="username" required>

    <label>رمز عبور</label>
    <div class="password-wrap">
      <input id="admin-password" type="password" name="password" required>
      <button class="eye-btn" type="button" onclick="togglePassword('admin-password', this)">👁</button>
    </div>

    <button class="btn" type="submit">ورود ادمین</button>
  </form>
</section>

<script>
function togglePassword(id, btn) {
  const input = document.getElementById(id);
  if (!input) return;
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.innerText = input.type === 'password' ? '👁' : '🙈';
}
</script>
{% endblock %}
