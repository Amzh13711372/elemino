{% extends "base.html" %}
{% block title %}ثبت نام{% endblock %}
{% block content %}
<div class="hero">
    <section class="card" style="width:100%;">
        <div class="center">
            <div class="logo">ع</div>
            <span class="badge">ثبت نام</span>
            <h2>ایجاد حساب کاربری علمینو</h2>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/register" method="post">
            <div class="field">
                <label>نام کاربری</label>
                <input type="text" name="username" required>
            </div>

            <div class="field">
                <label>کد ملی</label>
                <input type="text" name="national_id" required>
            </div>

            <div class="field">
                <label>رمز عبور</label>
                <div class="password-wrap">
                    <input id="reg_password" type="password" name="password" required>
                    <button class="toggle-eye" type="button" onclick="toggleRegPassword()">نمایش</button>
                </div>
            </div>

            <button type="submit" style="width:100%;">ثبت نام و ادامه</button>
        </form>

        <div class="tiny-links">
            <a class="ghost" href="/login">ورود</a>
            <a class="ghost" href="/">صفحه معرفی</a>
        </div>
    </section>
</div>

<script>
function toggleRegPassword() {
    const input = document.getElementById("reg_password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>
{% endblock %}
