<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پروفایل | علمینو</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#f8fafc,#eef2ff);
      color:#0f172a;
    }
    .page{width:100%;max-width:480px;margin:0 auto;padding:16px 14px 28px}
    .card{
      background:#fff;border-radius:24px;padding:18px;margin-bottom:14px;
      box-shadow:0 18px 40px rgba(15,23,42,.08);
    }
    .hero{text-align:center}
    .avatar{
      width:90px;height:90px;border-radius:28px;margin:0 auto 14px;background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;
      box-shadow:0 16px 35px rgba(34,197,94,.28);
    }
    h1{margin:0;font-size:25px}
    .sub{margin:8px 0 0;color:#64748b;font-size:14px}
    label{display:block;font-size:14px;font-weight:700;margin:14px 0 8px}
    input, textarea{
      width:100%;border:1px solid #e2e8f0;border-radius:18px;padding:14px 15px;font-size:15px;outline:none;background:#fff;
    }
    textarea{min-height:110px;resize:vertical}
    .btn{
      width:100%;border:none;border-radius:20px;padding:16px;margin-top:18px;
      background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:16px;font-weight:700;cursor:pointer;
      box-shadow:0 14px 26px rgba(22,163,74,.24);
    }
    .back{
      display:block;text-decoration:none;text-align:center;background:#fff;color:#0f172a;border:1px solid #e2e8f0;
      padding:14px;border-radius:18px;font-weight:700;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card hero">
      <div class="avatar">{{ user.avatar if user.avatar else "👤" }}</div>
      <h1>{{ user.name if user.name else user.username }}</h1>
      <div class="sub">@{{ user.username }}</div>
    </div>

    <div class="card">
      <form method="post" action="/profile">
        <label for="avatar">آواتار</label>
        <input id="avatar" name="avatar" type="text" value="{{ user.avatar if user.avatar else '👤' }}">

        <label for="name">نام نمایشی</label>
        <input id="name" name="name" type="text" value="{{ user.name if user.name else user.username }}">

        <label for="bio">بیو</label>
        <textarea id="bio" name="bio">{{ user.bio if user.bio else '' }}</textarea>

        <button class="btn" type="submit">ذخیره پروفایل</button>
      </form>
    </div>

    <a class="back" href="/home">بازگشت به خانه</a>
  </div>
</body>
</html>
